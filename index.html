<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pravalika - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b1014;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid #3B3B3B;
        }

        .header h1 {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .header p {
            font-size: 48px;
            line-height: 1.4;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Languages and Tools Section */
        .languages-tools {
            margin: 60px 0;
        }

        .section-title {
            font-size: 48px;
            text-decoration: underline;
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
        }

        .skills-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 700px;
            margin: 0 auto;
        }

        .skill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 60px;
        }

        .skill-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 48px;
        }

        .skill-icon {
            width: 40px;
            height: 40px;
            display: inline-block;
        }

        /* Pinterest Link Section */
        .pinterest-link {
            text-align: center;
            margin: 80px 0 40px;
        }

        .pinterest-link a {
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-decoration: none;
            word-break: break-all;
        }

        .pinterest-link a:hover {
            text-decoration: underline;
        }

        /* Connect Section */
        .connect-section {
            text-align: center;
            margin-top: 100px;
        }

        .connect-title {
            font-size: 48px;
            margin-bottom: 40px;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            padding: 0;
        }

        .social-btn:hover {
            transform: scale(1.1);
        }

        .social-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }

            .header p {
                font-size: 24px;
            }

            .section-title,
            .connect-title {
                font-size: 28px;
            }

            .skill-item {
                font-size: 24px;
            }

            .skill-row {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }

            .pinterest-link a {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

</body>
